};
const t = (tier) => T[tier] || T.C;

/* ── Expandable Card ── */
function Card({ a, i, exp, toggle, sport, dead, onArchive }) {
  const tc = t(a.tier);
  const isLive = a.saleStatus && (a.saleStatus.includes("🔴") || a.saleStatus.includes("LIVE") || a.saleStatus.includes("TODAY"));
  return (
    <div onClick={toggle} style={{
      background: dead ? "#111113" : "#18181b",
      border: `1px solid ${exp ? tc.bg + "44" : "#27272a"}`,
      borderRadius: 12, padding: 0, cursor: "pointer",
      transition: "all 0.25s ease",
      opacity: dead ? 0.4 : 1, filter: dead ? "saturate(0.2)" : "none",
      overflow: "hidden", position: "relative",
      transform: exp ? "translateY(-1px)" : "none",
      boxShadow: exp ? `0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px ${tc.bg}22` : "none",
    }}>
      {/* Top accent line */}
      <div style={{height:3,background:dead?"transparent":`linear-gradient(90deg,${tc.bg},${tc.light || tc.bg})`}}/>
      
      <div style={{padding:"16px 20px"}}>
        {/* Header row */}
        <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
            <div style={{fontSize:24,fontWeight:800,color:dead?"#3f3f46":tc.bg,lineHeight:1}}>{a.score}</div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"1.5px",color:dead?"#27272a":tc.bg,marginTop:2,background:tc.glow,padding:"2px 6px",borderRadius:4}}>{a.tier}</div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:600,color:dead?"#52525b":"#fafafa",lineHeight:1.3,textDecoration:dead?"line-through":"none"}}>{a.name}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
              {a.genre && <span style={{fontSize:10,padding:"3px 8px",borderRadius:5,background:"#1e1b4b",color:"#a78bfa",border:"1px solid #312e81",fontWeight:500}}>{a.genre}</span>}
              {!dead && a.venueSize && <span style={{fontSize:10,padding:"3px 8px",borderRadius:5,background:"#162217",color:"#4ade80",border:"1px solid #14532d",fontWeight:500}}>{a.venueSize}</span>}
              {sport && !dead && <span style={{fontSize:10,padding:"3px 8px",borderRadius:5,background:"#0c2a2a",color:"#2dd4bf",border:"1px solid #134e4a",fontWeight:700}}>SPORTS</span>}
              {dead && <span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:"rgba(239,68,68,0.1)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.2)",fontWeight:700,letterSpacing:"1px"}}>DEAD</span>}
            </div>
            {a.saleStatus && (
              <div style={{fontSize:11,fontWeight:600,marginTop:6,color:isLive?"#ef4444":a.saleStatus.includes("🟡")?"#fbbf24":"#71717a",letterSpacing:"0.3px"}}>
                {a.saleStatus}
              </div>
            )}
          </div>
          <div style={{flexShrink:0,fontSize:18,color:"#3f3f46",transform:exp?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</div>
        </div>

        {/* Expanded content */}
        {exp && (
          <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid #27272a"}}>
            
            {/* Sale Details */}
            {a.saleDetails && (
              <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid #27272a",borderRadius:8,marginBottom:14,fontSize:12,color:"#d4d4d8",lineHeight:1.6}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:"1.5px",color:isLive?"#ef4444":"#fbbf24",marginBottom:4}}>SALE INFO</div>
                {a.saleDetails}
              </div>
            )}

            {/* Stat grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginBottom:14}}>
              {[
                {l:sport?"RECORD":"STREAMS",v:a.streams},
                {l:sport?"LAST RUN":"LAST TOUR",v:a.lastTour},
                {l:"SCARCITY",v:a.scarcity}
              ].filter(x=>x.v).map(x=>(
                <div key={x.l} style={{background:"#0f0f11",borderRadius:8,padding:"10px 12px",border:"1px solid #1a1a1e"}}>
                  <div style={{fontSize:9,color:"#52525b",letterSpacing:"1.5px",marginBottom:4,fontWeight:600}}>{x.l}</div>
                  <div style={{fontSize:12,fontWeight:500,color:"#a1a1aa",lineHeight:1.5}}>{x.v}</div>
                </div>
              ))}
            </div>

            {/* Reasoning */}
            {a.reasoning && (
              <div style={{fontSize:13,color:"#a1a1aa",lineHeight:1.65,marginBottom:14}}>
                <span style={{color:tc.bg,fontWeight:600,fontSize:10,letterSpacing:"1px"}}>ANALYSIS </span>
                {a.reasoning}
              </div>
            )}

            {/* Target Cities */}
            {a.targetCities && a.targetCities.length > 0 && (
              <div style={{padding:"12px 14px",background:"rgba(52,211,153,0.04)",border:"1px solid rgba(52,211,153,0.15)",borderRadius:8,marginBottom:14}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:"2px",color:"#34d399",marginBottom:8}}>🎯 TARGET CITIES</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {a.targetCities.map((c,ci)=>(
                    <div key={ci} style={{display:"flex",gap:8,alignItems:"flex-start",fontSize:12,lineHeight:1.5}}>
                      <span style={{flexShrink:0}}>{c.emoji||"📍"}</span>
                      <div>
                        <span style={{color:"#fafafa",fontWeight:600}}>{c.city}</span>
                        {c.venue && <span style={{color:"#71717a"}}> — {c.venue}</span>}
                        {c.date && <span style={{color:"#a78bfa",fontWeight:500}}> ({c.date})</span>}
                        {c.why && <div style={{color:"#a1a1aa",fontSize:11,marginTop:2}}>{c.why}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Pipeline tracking */}
            {a.pipelineFrom && (
              <div style={{padding:"12px 14px",background:"rgba(99,102,241,0.04)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:8,marginBottom:14}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:"2px",color:"#818cf8",marginBottom:6}}>🔗 PIPELINE</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{fontSize:11,color:"#a1a1aa"}}><span style={{color:"#818cf8",fontWeight:600}}>FROM:</span> {a.pipelineFrom}</div>
                  <div style={{fontSize:11,color:"#a1a1aa"}}><span style={{color:"#818cf8",fontWeight:600}}>WINDOW:</span> {a.pipelineWindow}</div>
                </div>
              </div>
            )}

            {/* Streaming gap */}
            {a.gapRatio && (
              <div style={{padding:"12px 14px",background:"rgba(251,146,60,0.04)",border:"1px solid rgba(251,146,60,0.15)",borderRadius:8,marginBottom:14}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:"2px",color:"#fb923c",marginBottom:4}}>📊 STREAMING GAP</div>
                <div style={{fontSize:13,color:"#fbbf24",fontWeight:600}}>{a.gapRatio}</div>
              </div>
            )}

            {/* Action */}
            {a.action && (
              <div style={{padding:"10px 14px",background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.15)",borderRadius:8,fontSize:12,color:"#c4b5fd",lineHeight:1.5,marginBottom:14}}>
                ⚡ {a.action}
              </div>
            )}

            {/* Buttons */}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              {a.ticketLink && (
                <a href={a.ticketLink} target="_blank" rel="noopener noreferrer" onClick={(ev)=>ev.stopPropagation()} style={{
                  background:"#a78bfa",color:"#000",border:"none",
                  borderRadius:8,padding:"8px 20px",cursor:"pointer",textDecoration:"none",
                  fontSize:12,fontWeight:700,transition:"all 0.2s",display:"inline-flex",alignItems:"center",gap:6,
                }}>🎟️ Get Tickets</a>
              )}
              <button onClick={(ev)=>{ev.stopPropagation();onArchive(a.name);}} style={{
                background:dead?"rgba(52,211,153,0.08)":"rgba(239,68,68,0.06)",
                border:`1px solid ${dead?"rgba(52,211,153,0.2)":"rgba(239,68,68,0.15)"}`,
                borderRadius:8,padding:"8px 16px",cursor:"pointer",
                fontSize:11,fontWeight:600,color:dead?"#34d399":"#71717a",transition:"all 0.2s",
              }}>{dead?"♻️ Revive":"💀 Dead"}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Section Header ── */
function SH({title,sub,count,color="#a78bfa"}) {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"1px solid #1e1e24"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <h2 style={{fontSize:15,fontWeight:700,color:"#fafafa",letterSpacing:"-0.3px"}}>{title}</h2>
        {count!==undefined && <span style={{fontSize:11,background:"#27272a",color:"#a1a1aa",padding:"2px 8px",borderRadius:10,fontWeight:600}}>{count}</span>}
      </div>
      {sub && <span style={{fontSize:11,color:"#52525b"}}>{sub}</span>}
    </div>
  );
}

/* ── Alert Banner ── */
function AB({emoji,title,sub,color="#a78bfa"}) {
  return (
    <div style={{padding:"12px 16px",background:`${color}08`,border:`1px solid ${color}22`,borderRadius:10,marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:18}}>{emoji}</span>
      <div>
        <div style={{fontSize:13,fontWeight:600,color}}>{title}</div>
        <div style={{fontSize:11,color:"#71717a",marginTop:2}}>{sub}</div>
      </div>
    </div>
  );
}

/* ── Main Dashboard ── */
function OptimusDashboard() {
  const [tab,setTab]=useState("thisweek");
  const [expanded,setExpanded]=useState({});
  const [archived,setArchived]=useState(new Set());
  const [showDead,setShowDead]=useState(true);
  const [search,setSearch]=useState("");

  const toggle=(section,name)=>setExpanded(p=>({...p,[section]:p[section]===name?null:name}));
  const toggleArchive=(name)=>setArchived(p=>{const n=new Set(p);n.has(name)?n.delete(name):n.add(name);return n;});
  const sortDead=(arr)=>{const live=arr.filter(a=>!archived.has(a.name));const dead=arr.filter(a=>archived.has(a.name));return [...live,...dead];};

  const all=useMemo(()=>[...SCAN_DATA.nextWeek,...SCAN_DATA.thisWeek,...SCAN_DATA.alreadyOnSale,...SCAN_DATA.smallVenue,...SCAN_DATA.comedy,...SCAN_DATA.redRocks,...SCAN_DATA.sports,...SCAN_DATA.pipeline,...SCAN_DATA.streamingGap],[]);
  const tc=useMemo(()=>{const c={S:0,A:0,B:0,C:0};all.forEach(a=>{const k=a.tier==="S+"?"S":a.tier==="B+"?"B":a.tier;if(c[k]!==undefined)c[k]++});return c;},[all]);

  const filterBySearch=(arr)=>{
    if(!search)return arr;
    const q=search.toLowerCase();
    return arr.filter(a=>a.name.toLowerCase().includes(q)||a.genre?.toLowerCase().includes(q)||(a.targetCities||[]).some(c=>c.city?.toLowerCase().includes(q)));
  };

  const tabs=[
    {id:"thisweek",label:"This Week",count:SCAN_DATA.thisWeek.length},
    {id:"nextweek",label:"Next Week",count:SCAN_DATA.nextWeek.length},
    {id:"onsale",label:"On Sale",count:SCAN_DATA.alreadyOnSale.length},
    {id:"smallvenue",label:"Emerging",count:SCAN_DATA.smallVenue.length},
    {id:"sports",label:"Sports",count:SCAN_DATA.sports.length},
    {id:"comedy",label:"Comedy",count:SCAN_DATA.comedy.length},
    {id:"redrocks",label:"Red Rocks",count:SCAN_DATA.redRocks.length},
    {id:"pipeline",label:"Pipeline",count:SCAN_DATA.pipeline.length},
    {id:"gap",label:"Gap",count:SCAN_DATA.streamingGap.length},
    {id:"deadzone",label:"Dead Zones",count:SCAN_DATA.deadZones.length},
    {id:"radio",label:"Radio",count:SCAN_DATA.radioMonitor.length},
    {id:"method",label:"Method"},
  ];

  const renderCards=(data,section,sport=false)=>{
    const filtered = filterBySearch(showDead ? sortDead(data) : data.filter(a=>!archived.has(a.name)));
    return (
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(360px,1fr))",gap:12,marginBottom:32}}>
        {filtered.map((a,i)=><Card key={`${section}${a.name}`} a={a} i={i} sport={sport} exp={expanded[section]===a.name} toggle={()=>toggle(section,a.name)} dead={archived.has(a.name)} onArchive={toggleArchive}/>)}
      </div>
    );
  };

  return (
    <div style={{minHeight:"100vh",background:"#09090b",color:"#e4e4e7",fontFamily:"'Inter','system-ui',sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{height:4px;width:4px}
        ::-webkit-scrollbar-track{background:#09090b}
        ::-webkit-scrollbar-thumb{background:#27272a;border-radius:4px}
        @media(max-width:768px){
          .grid-cards{grid-template-columns:1fr!important}
          .nav-inner{padding:12px 16px!important}
          .main-content{padding:16px!important}
          .filter-scroll{gap:4px!important}
          .stat-row{grid-template-columns:repeat(2,1fr)!important}
        }
      `}</style>

      {/* Navigation */}
      <nav style={{borderBottom:"1px solid #18181b",background:"#09090b",position:"sticky",top:0,zIndex:50}}>
        <div className="nav-inner" style={{maxWidth:1200,margin:"0 auto",padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <h1 style={{fontSize:20,fontWeight:800,color:"#fafafa",letterSpacing:"-0.5px"}}>
              <span style={{color:"#a78bfa"}}>◉</span> Optimus
            </h1>
          </div>
          <div style={{fontSize:11,color:"#52525b",display:"flex",gap:16,alignItems:"center"}}>
            <span>Scan v18</span>
            <span><span style={{color:"#a78bfa",fontWeight:600}}>{all.length}</span> events</span>
            <span><span style={{color:"#ef4444",fontWeight:600}}>{tc.S}</span> S-tier</span>
          </div>
        </div>

      <div className="main-content" style={{maxWidth:1200,margin:"0 auto",padding:"20px 24px"}}>

        {/* Search */}
        <div style={{marginBottom:16}}>

            width:"100%",background:"#18181b",border:"1px solid #27272a",borderRadius:10,
            padding:"12px 16px",color:"#e4e4e7",fontSize:14,fontFamily:"inherit",outline:"none",
            transition:"border-color 0.2s",
          }} onFocus={e=>e.target.style.borderColor="#a78bfa"} onBlur={e=>e.target.style.borderColor="#27272a"}/>
        </div>

        {/* Summary stats */}
        <div className="stat-row" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>

            {label:"A-TIER",value:tc.A,color:"#f97316"},
            {label:"B-TIER",value:tc.B,color:"#8b5cf6"},

        </div>

        {/* Dead toggle */}
        {archived.size>0 && (
          <button onClick={()=>setShowDead(!showDead)} style={{

            border:`1px solid ${showDead?"rgba(239,68,68,0.15)":"rgba(52,211,153,0.15)"}`,
            borderRadius:8,padding:"8px 16px",cursor:"pointer",marginBottom:16,

        </div>

        {/* Tab content */}
        {tab==="thisweek"&&(<>

        {tab==="nextweek"&&(<>

        {tab==="onsale"&&(<>

                  <span style={{fontSize:9,fontWeight:700,letterSpacing:"1px",color:"#fbbf24"}}>EXAMPLES: </span>

                <div style={{padding:"8px 12px",background:"rgba(167,139,250,0.04)",border:"1px solid rgba(167,139,250,0.1)",borderRadius:6}}>
                  <span style={{fontSize:9,fontWeight:700,letterSpacing:"1px",color:"#c4b5fd"}}>PLAYBOOK: </span>

                  }}>{r.trend} {r.position}</span>

                </div>
                <div style={{fontSize:13,color:"#22d3ee",fontWeight:500,marginBottom:6}}>"{r.song}" — {r.weeks}</div>

              <p style={{fontSize:12,color:"#52525b",marginBottom:12}}>S (85+) · A (70-84) · B (55-69) · C (&lt;55)</p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[["Touring Scarcity","30%","Years since last tour ÷ demand"],["Streaming Volume","25%","Monthly listeners vs genre peers"],["Social Buzz","20%","Reddit/X/IG mentions"],["Momentum","15%","Viral moments, album drops"],["Market Gap","10%","No secondary comps"]].map(([f,w,d])=>(
                  <div key={f} style={{background:"#18181b",border:"1px solid #27272a",borderRadius:10,padding:"14px 18px",display:"flex",alignItems:"center",gap:16}}>
                    <div style={{fontSize:16,fontWeight:800,color:"#a78bfa",width:44,flexShrink:0}}>{w}</div>
                    <div><div style={{fontSize:13,fontWeight:600,color:"#e4e4e7"}}>{f}</div><div style={{fontSize:11,color:"#52525b"}}>{d}</div></div>
                  </div>
                ))}
              </div>
            </div>
            <div>
              <h3 style={{fontSize:14,fontWeight:700,color:"#34d399",marginBottom:12}}>Sports Score (0-100)</h3>

                {[["Team Momentum","30%","Win streak, playoff positioning"],["Historical Turnaround","25%","Cinderella factor"],["Market Gap","20%","Face vs secondary spread"],["Playoff Proximity","15%","Tournament implications"],["Narrative","10%","Cultural moment"]].map(([f,w,d])=>(

              </div>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{marginTop:40,paddingTop:16,borderTop:"1px solid #18181b",display:"flex",justifyContent:"space-between",fontSize:11,color:"#27272a"}}>
          <span>OPTIMUS — Ticket Intelligence</span>
          <span>{SCAN_DATA.lastRun}</span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(OptimusDashboard));
</script>
